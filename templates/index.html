<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="AI-powered Faculty Workload Scheduling & Substitution Portal for Sathyabama Institute of Science and Technology">
    <title>Faculty Workload Portal — Sathyabama Institute</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>
    <!-- Login Screen -->
    <div id="login-screen" class="login-screen">
        <div class="login-bg-shapes">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
            <div class="shape shape-3"></div>
        </div>
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">
                    <div class="logo-icon">
                        <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
                            <rect width="40" height="40" rx="10" fill="url(#logo-grad)" />
                            <path d="M12 28V14l8-4 8 4v14l-8 4-8-4z" fill="white" fill-opacity="0.9" />
                            <path d="M20 10v18M12 14l8 4 8-4" stroke="rgba(0,0,0,0.2)" stroke-width="1" />
                            <defs>
                                <linearGradient id="logo-grad" x1="0" y1="0" x2="40" y2="40">
                                    <stop stop-color="#c0392b" />
                                    <stop offset="1" stop-color="#e67e22" />
                                </linearGradient>
                            </defs>
                        </svg>
                    </div>
                    <h1>Faculty Workload Portal</h1>
                    <p class="login-subtitle">Sathyabama Institute of Science and Technology</p>
                </div>
            </div>
            <form id="login-form" onsubmit="return false;">
                <div class="form-group">
                    <label for="login-username">Username</label>
                    <input type="text" id="login-username" placeholder="Enter your username" required
                        autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" placeholder="Enter your password" required
                        autocomplete="current-password">
                </div>
                <div id="login-error" class="error-msg hidden"></div>
                <button type="submit" id="login-btn" class="btn btn-primary btn-full">
                    <span>Sign In</span>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M5 12h14M12 5l7 7-7 7" />
                    </svg>
                </button>
            </form>
            <div class="login-footer">
                <p>AI-Powered Scheduling & Substitution System</p>
            </div>
        </div>
    </div>

    <!-- Main App Shell (hidden until login) -->
    <div id="app-shell" class="app-shell hidden">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <svg width="32" height="32" viewBox="0 0 40 40" fill="none">
                        <rect width="40" height="40" rx="10" fill="url(#sidebar-grad)" />
                        <path d="M12 28V14l8-4 8 4v14l-8 4-8-4z" fill="white" fill-opacity="0.9" />
                        <defs>
                            <linearGradient id="sidebar-grad" x1="0" y1="0" x2="40" y2="40">
                                <stop stop-color="#ffffff" />
                                <stop offset="1" stop-color="#ffffff" />
                            </linearGradient>
                        </defs>
                    </svg>
                    <span>SIST Portal</span>
                </div>
            </div>
            <nav id="sidebar-nav" class="sidebar-nav">
                <!-- Populated by JS based on role -->
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar" id="user-avatar">A</div>
                    <div class="user-details">
                        <span id="user-display-name" class="user-name">Admin</span>
                        <span id="user-role-display" class="user-role">Administrator</span>
                    </div>
                </div>
                <button id="logout-btn" class="btn-icon" title="Logout">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9" />
                    </svg>
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <button id="menu-toggle" class="btn-icon menu-toggle">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 12h18M3 6h18M3 18h18" />
                    </svg>
                </button>
                <h2 id="page-title" class="page-title">Dashboard</h2>
                <div class="top-bar-actions">
                    <button id="notif-btn" class="btn-icon notif-btn" title="Notifications">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0" />
                        </svg>
                        <span id="notif-badge" class="notif-badge hidden">0</span>
                    </button>
                </div>
            </header>
            <div id="page-content" class="page-content">
                <!-- Dynamic content loaded here -->
                <div class="loading-spinner">
                    <div class="spinner"></div>
                    <p>Loading...</p>
                </div>
            </div>
        </main>

        <!-- Notification Panel -->
        <div id="notif-panel" class="notif-panel hidden">
            <div class="notif-panel-header">
                <h3>Notifications</h3>
                <div class="notif-actions">
                    <button id="mark-all-read-btn" class="btn btn-sm btn-ghost">Mark All Read</button>
                    <button id="clear-history-btn" class="btn btn-sm btn-ghost btn-danger">Clear History</button>
                    <button id="close-notif-btn" class="btn-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M18 6L6 18M6 6l12 12" />
                        </svg>
                    </button>
                </div>
            </div>
            <div id="notif-list" class="notif-list">
                <p class="empty-state">No notifications</p>
            </div>
        </div>
    </div>

    <!-- Modal Overlay -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div id="modal-container" class="modal-container">
            <div class="modal-header">
                <h3 id="modal-title">Modal</h3>
                <button id="modal-close" class="btn-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 6L6 18M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <div id="modal-body" class="modal-body">
                <!-- Dynamic modal content -->
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Scripts -->
    <script src="/static/js/app.js"></script>
    <script src="/static/js/auth.js"></script>
    <script src="/static/js/admin.js"></script>
    <script src="/static/js/faculty.js"></script>
</body>

</html>
